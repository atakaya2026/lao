<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100dvh; background: #6b7280;
    font-family: 'Noto Sans Lao', sans-serif;
    overflow: hidden;
    display: flex; justify-content: center; align-items: stretch;
  }
  #phone-wrap {
    width: min(100%, 480px); height: 100%;
    display: flex; flex-direction: column;
    background: #e8e4dc;
    box-shadow: 0 -5px 40px rgba(0,0,0,0.5);
    position: relative; overflow: hidden;
  }
  #action-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: #1a3a2a; border-bottom: 2px solid #4caf80;
  }
  #action-bar .title { color: #4caf80; font-size: 15px; font-weight: bold; letter-spacing: 1px; }
  .action-btn { padding: 5px 12px; border-radius: 6px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; }
  .action-btn.reset { background: #6b7280; color: #fff; }

  #editor {
    flex: 1; width: 100%; background: #faf7f2;
    padding: 16px 20px; font-size: 30px; line-height: 1.8;
    border: none; outline: none; overflow-y: auto;
    white-space: pre-wrap; color: #1a1208; overflow-wrap: break-word;
  }
  .cursor { color: #4caf80; animation: blink 1s step-end infinite; font-weight: 100; }
  @keyframes blink { from, to { opacity: 0; } 50% { opacity: 1; } }

  /* ── 키보드 래퍼 ── */
  #keyboard-wrap {
    position: relative;
    width: 100%;
    flex-shrink: 0;
    border-top: 1px solid #555;
    overflow: hidden;
    /* 높이는 #ad-img가 결정 */
  }

  /* 레이어 1: 아기 사진 (높이를 자연스럽게 결정) */
  #ad-bg {
    position: relative;
    width: 100%;
    z-index: 1;
    overflow: hidden;
  }
  #ad-img {
    display: block;
    width: 100%;
    height: auto;
    filter: blur(0px) brightness(1);
    transition: filter 0.45s ease;
  }
  /* 블러 상태 */
  #ad-bg.blurred #ad-img {
    filter: blur(22px) brightness(1) saturate(1.2);
    transform: scale(1.06);
    transition: filter 0.45s ease, transform 0.45s ease;
  }

  /* 레이어 2: 키들 (초기엔 숨김, 블러 후 표시) */
  #kbd {
    position: absolute; inset: 0;
    z-index: 2;
    opacity: 0;
    pointer-events: none;
    transform: translateX(100%);
    transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  #kbd.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(0%);
  }

  /* 레이어 3: 사진 상태일 때 터치 받는 오버레이 */
  #photo-tap {
    position: absolute; inset: 0;
    z-index: 3;
    cursor: pointer;
  }
  #photo-tap.hidden {
    display: none;
  }

  /* ── 키 공통 ── */
  .kbd-btn {
    position: absolute;
    border: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Sans Lao', sans-serif; font-weight: bold;
    padding: 0;
    background: transparent;
    border-radius: 0;
    box-shadow: none;
  }
  .kbd-btn:active { opacity: 0.5; }

  /* 자음 키 */
  .kbd-consonant {
    flex-direction: column; gap: 0; line-height: 1;
    color: #fff;
  }
  .kbd-consonant .main-char { font-size: clamp(13px, 4.8vw, 28px); font-weight: 900; line-height: 1; }
  .kbd-consonant .sub-chars { font-size: clamp(6px, 2.4vw, 14px); color: rgba(255,255,255,0.8); line-height: 1; letter-spacing: 0.5px; }

  /* 부호 키 */
  .kbd-sign {
    font-size: clamp(11px, 4.2vw, 24px);
    color: #ffe599;
    font-weight: 700;
    flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 2px;
  }

  /* 변환키 */
  .kbd-next {
    font-size: clamp(12px, 4.5vw, 21px);
    color: #ffd580;
    font-weight: 900;
  }
  .kbd-next.hconj-active { color: #7fff9a; }

  /* 기능키 (123, 스페이스, 엔터, ໆຯ) */
  .kbd-func-key {
    font-size: clamp(13px, 4.8vw, 24px);
    color: #fff;
    font-weight: 700;
    background: transparent;
    letter-spacing: 0.3px;
  }
  .kbd-bs {
    font-size: clamp(14px, 5vw, 22px);
    color: #fff;
    background: transparent;
  }

  /* 스와이프 힌트 (블러 상태에서 우측 화살표) */
  #swipe-hint {
    position: absolute;
    right: 6px; top: 50%;
    transform: translateY(-50%);
    z-index: 4;
    color: rgba(255,255,255,0.55);
    font-size: 22px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
  }
  #swipe-hint.show { opacity: 1; }
</style>
</head>
<body>
<div id="phone-wrap">
  <div id="action-bar">
    <span class="title">ຮາທາບັງ</span>
    <button class="action-btn reset" onclick="resetAll()">↺ ລ້າງ</button>
  </div>
  <div id="editor"></div>
  <div id="keyboard-wrap">
    <!-- 레이어1: 아기 사진 배경 -->
    <div id="ad-bg">
      <img id="ad-img" src="images/ad.png" alt="ad" draggable="false" />
    </div>
    <!-- 레이어2: 키들 -->
    <div id="kbd"></div>
    <!-- 레이어3: 사진 탭 영역 (사진 상태일 때만 활성) -->
    <div id="photo-tap"></div>
    <!-- 스와이프 힌트 -->
    <div id="swipe-hint">›</div>
  </div>
</div>

<script>
// ── 키보드 데이터 ─────────────────────────────────
const consonantRows = {
  'ຮ': ['ຮ','ຣ'], 'ທ': ['ທ','ຫ'], 'ບ': ['ບ','ປ'], 'ງ': ['ງ','ຈ'],
  'ພ': ['ພ','ຜ','ຝ','ຟ'], 'ວ': ['ວ','ລ'], 'ນ': ['ນ','ມ'], 'ດ': ['ດ','ຕ'],
  'ຂ': ['ຂ','ຊ'], 'ຄ': ['ຄ','ຍ','ຢ'], 'ອ': ['ອ','ສ'], 'ກ': ['ກ','ຖ'],
};
const leftKeys = [
  ['ຮ','ທ','ບ','ງ'],
  ['ພ','ວ','ນ','ດ'],
  ['ຂ','ຄ','ອ','ກ'],
];
const rightKeys = [
  [
    { type:'sign', chars:['ີ','ິ','ຶ'] },
    { type:'sign', chars:['ັ','ົ','ື'] },
    { type:'sign', chars:['່','໋'] },
    { type:'sign', chars:['້','໊'] },
  ],
  [
    { type:'sign', chars:['ເ','ແ'], display:'ເ' },
    { type:'next' },
    { type:'sign', chars:['າ','ຳ'] },
    { type:'sign', chars:['ະ','ໍ'] },
  ],
  [
    { type:'sign', chars:['ໃ','ໄ','ໂ'] },
    { type:'sign', chars:['ຸ','ູ'] },
    { type:'dot' },
    { type:'bs' },
  ],
];
const hConjSet = new Set(['ນ','ມ','ງ','ຍ','ລ','ວ','ຣ']);
const hConjMap = { 'ນ': 'ໜ', 'ມ': 'ໝ', 'ລ': 'ຫຼ' };

let state = { activeRoot:null, activeCharIdx:0, lastSignKey:null, signTapIdx:0, hConjMode:false, hConjChar:null };

const editor = document.getElementById('editor');
function getText() { return editor.dataset.text || ''; }
function setText(t) {
  editor.dataset.text = t;
  const esc = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  editor.innerHTML = esc + '<span class="cursor">|</span>';
}
function appendText(c) { setText(getText() + c); }
function replaceLastChar(c) { const t=getText(); if(!t.length)return; setText(t.slice(0,-1)+c); }
function backspace() { const t=getText(); if(!t.length)return; setText(t.slice(0,-1)); }
function getRoot(char) {
  for(const [root,arr] of Object.entries(consonantRows)) if(arr.includes(char)) return root;
  return null;
}
function handleConsonant(root) {
  const arr = consonantRows[root]; const char = arr[0];
  if (state.hConjMode) {
    const tc = getText(); if (tc.endsWith('+')) setText(tc.slice(0,-1));
    backspace();
    if (hConjSet.has(char)) { const conjChar = hConjMap[char]||('ຫ'+char); appendText(conjChar); state.hConjChar = char; }
    else { appendText(char); state.hConjChar = null; }
    state.hConjMode = false; state.activeRoot = null; state.activeCharIdx = 0;
    state.lastSignKey = null; state.signTapIdx = 0; render(); return;
  }
  appendText(char);
  state.activeRoot = root; state.activeCharIdx = 0;
  state.lastSignKey = null; state.signTapIdx = 0; state.hConjMode = false; state.hConjChar = null;
  render();
}
function handleNext() {
  if (state.hConjChar) {
    const conjRoot = getRoot(state.hConjChar);
    if (conjRoot) {
      const arr = consonantRows[conjRoot];
      const curIdx = arr.indexOf(state.hConjChar);
      const nextIdx = (curIdx+1)%arr.length; const nextChar = arr[nextIdx];
      const currentConj = hConjMap[state.hConjChar]||('ຫ'+state.hConjChar);
      const t = getText(); setText(t.slice(0,-currentConj.length));
      const newConj = hConjMap[nextChar]||('ຫ'+nextChar); appendText(newConj);
      state.hConjChar = nextChar; state.lastSignKey = null; state.signTapIdx = 0; render(); return;
    }
  }
  if (!state.activeRoot) return;
  const arr = consonantRows[state.activeRoot];
  if (state.activeRoot === 'ທ') {
    if (state.activeCharIdx===0) { replaceLastChar('ຫ'); state.activeCharIdx=1; state.hConjMode=false; }
    else if (state.activeCharIdx===1) { state.hConjMode=true; state.activeCharIdx=2; appendText('+'); }
    else { const t2=getText(); if(t2.endsWith('+')) setText(t2.slice(0,-1)); replaceLastChar('ທ'); state.hConjMode=false; state.activeCharIdx=0; }
    state.lastSignKey=null; state.signTapIdx=0; render(); return;
  }
  const nextIdx=(state.activeCharIdx+1)%arr.length;
  replaceLastChar(arr[nextIdx]); state.activeCharIdx=nextIdx;
  state.lastSignKey=null; state.signTapIdx=0; render();
}
function handleSign(keyId, chars) {
  if (state.lastSignKey===keyId) {
    state.signTapIdx=(state.signTapIdx+1)%chars.length;
    const t=getText(); setText(t.slice(0,-1)+chars[state.signTapIdx]);
  } else { state.lastSignKey=keyId; state.signTapIdx=0; appendText(chars[0]); }
  state.activeRoot=null; state.activeCharIdx=0; render();
}
function handleDot() {
  appendText('.'); state.lastSignKey=null; state.signTapIdx=0;
  state.activeRoot=null; state.activeCharIdx=0; render();
}
function handleBS() {
  const tb=getText(); if(state.hConjMode&&tb.endsWith('+')) setText(tb.slice(0,-1));
  backspace(); state.lastSignKey=null; state.signTapIdx=0; state.hConjMode=false;
  const t=getText(); const last=t.length?t[t.length-1]:null; const root=last?getRoot(last):null;
  state.activeRoot=root; state.activeCharIdx=root?consonantRows[root].indexOf(last):0; render();
}
function handleRepeat() {
  const chars=['ໆ','ຯ']; const keyId='repeat';
  if (state.lastSignKey===keyId) {
    state.signTapIdx=(state.signTapIdx+1)%chars.length;
    const t=getText(); setText(t.slice(0,-1)+chars[state.signTapIdx]);
  } else { state.lastSignKey=keyId; state.signTapIdx=0; appendText(chars[0]); }
  state.activeRoot=null; state.activeCharIdx=0; render();
}
function isDiacritic(c) {
  const cp=c.codePointAt(0);
  return (cp>=0x0EB4&&cp<=0x0EB9)||cp===0x0EB1||cp===0x0EBB||cp===0x0EBC||(cp>=0x0EC8&&cp<=0x0ECD)||cp===0x0EC6;
}

// ── 레이아웃: 퍼센트 기반 그리드 ───────────────────
// 키보드 높이 220px 기준
// 4열 자음(좌) + 4열 부호(우) = 8열, 3행
// 하단바: 123 | 스페이스 | ໆຯ | Enter
// 각 키 W=11.5%, H=22%, gap 포함
const COL = (i) => (1.2 + i * 12.2) + '%';  // 8열
const ROW = (i) => (2 + i * 25) + '%';       // 3행
const KW = '11.0%', KH = '22%';
const BOT_Y = '77%', BOT_H = '20%';

function makeBtn(extraClass, style, onClick, label) {
  const b = document.createElement('button');
  b.className = 'kbd-btn ' + (extraClass||'');
  Object.assign(b.style, style);
  if (label !== undefined) b.textContent = label;
  if (onClick) b.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (isDragging) return;
    onClick();
  });
  return b;
}

function render() {
  const kbd = document.getElementById('kbd');
  kbd.innerHTML = '';

  for (let row=0; row<3; row++) {
    // 좌: 자음 4개
    for (let col=0; col<4; col++) {
      const root = leftKeys[row][col];
      const arr = consonantRows[root];
      const b = makeBtn('kbd-consonant', { left:COL(col), top:ROW(row), width:KW, height:KH }, () => handleConsonant(root));
      const main = document.createElement('span');
      main.className = 'main-char'; main.textContent = arr[0];
      b.appendChild(main);
      if (arr.length > 1) {
        const sub = document.createElement('span');
        sub.className = 'sub-chars'; sub.textContent = arr.slice(1).join('');
        b.appendChild(sub);
      }
      kbd.appendChild(b);
    }
    // 우: 부호 4개
    for (let col=0; col<4; col++) {
      const rk = rightKeys[row][col];
      const style = { left:COL(col+4), top:ROW(row), width:KW, height:KH };
      if (rk.type === 'next') {
        const b = makeBtn('kbd-next'+(state.hConjMode?' hconj-active':''), style, () => handleNext());
        if (state.hConjChar) {
          const conjRoot = getRoot(state.hConjChar);
          if (conjRoot) { const a=consonantRows[conjRoot]; b.textContent=a[(a.indexOf(state.hConjChar)+1)%a.length]; }
          else b.textContent='⇄';
        } else if (state.hConjMode) { b.textContent='+'; }
        else if (state.activeRoot) {
          const a=consonantRows[state.activeRoot];
          if (state.activeRoot==='ທ') {
            if (state.activeCharIdx===0) b.textContent='ຫ';
            else if (state.activeCharIdx===1) b.textContent='ຫ+';
            else b.textContent='+';
          } else { b.textContent=a[(state.activeCharIdx+1)%a.length]; }
        } else b.textContent='⇄';
        kbd.appendChild(b);
      } else if (rk.type === 'bs') {
        const b = makeBtn('kbd-bs', style, handleBS); b.textContent='⌫';
        kbd.appendChild(b);
      } else if (rk.type === 'dot') {
        kbd.appendChild(makeBtn('kbd-sign', style, handleDot, '.'));
      } else if (rk.type === 'sign') {
        const b = makeBtn('kbd-sign', style, () => handleSign('r'+row+'c'+col, rk.chars));
        const displayChars = rk.display ? [rk.display] : rk.chars;
        displayChars.forEach(c => {
          const s = document.createElement('span'); s.style.lineHeight='1';
          s.innerHTML = isDiacritic(c) ? '\u25CC'+c : c;
          b.appendChild(s);
        });
        kbd.appendChild(b);
      }
    }
  }

  // ── 하단바: 123 | ສະເປດ | ໆຯ | ກັບ↵ ─────────────
  kbd.appendChild(makeBtn('kbd-func-key', { left:'1%', top:BOT_Y, width:'14%', height:BOT_H }, null, '123'));

  kbd.appendChild(makeBtn('kbd-func-key', { left:'16%', top:BOT_Y, width:'42%', height:BOT_H }, () => {
    appendText(' '); state.activeRoot=null; state.activeCharIdx=0;
    state.lastSignKey=null; state.hConjMode=false; render();
  }, 'ສະເປດ'));

  kbd.appendChild(makeBtn('kbd-func-key', { left:'59%', top:BOT_Y, width:'14%', height:BOT_H }, handleRepeat, 'ໆຯ'));

  kbd.appendChild(makeBtn('kbd-func-key', { left:'74%', top:BOT_Y, width:'25%', height:BOT_H }, () => { appendText('\n'); render(); }, 'ກັບ↵'));
}

function resetAll() {
  setText('');
  state={ activeRoot:null,activeCharIdx:0,lastSignKey:null,signTapIdx:0,hConjMode:false,hConjChar:null };
  render();
}

// ── 아기 사진 인터랙션 ─────────────────────────────
const adBg  = document.getElementById('ad-bg');
const adImg = document.getElementById('ad-img');
const kbdDiv  = document.getElementById('kbd');
const photoTap = document.getElementById('photo-tap');
const swipeHint = document.getElementById('swipe-hint');
let kbdOpen = false;

function openKeyboard() {
  kbdOpen = true;
  // transform 초기화 후 visible 적용해야 슬라이드 인 애니메이션이 항상 재생됨
  kbdDiv.style.transition = 'none';
  kbdDiv.style.transform = 'translateX(100%)';
  kbdDiv.style.opacity = '0';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      kbdDiv.style.transition = '';
      kbdDiv.style.transform = '';
      kbdDiv.style.opacity = '';
      adBg.classList.add('blurred');
      kbdDiv.classList.add('visible');
      photoTap.classList.add('hidden');
      swipeHint.classList.add('show');
    });
  });
}
function closeKeyboard() {
  kbdOpen = false;
  adBg.classList.remove('blurred');
  kbdDiv.classList.remove('visible');
  photoTap.classList.remove('hidden');
  swipeHint.classList.remove('show');
  kbdDiv.style.transform = '';
  kbdDiv.style.transition = '';
  swipeHint.style.transform = '';
  swipeHint.style.transition = '';
}

// 사진 탭 → 키보드 열기
photoTap.addEventListener('pointerdown', e => { e.preventDefault(); openKeyboard(); });

// 스와이프로 닫기 — pointerdown/move/up으로 마우스+터치 모두 대응
let txStart = null;
let isDragging = false;
let textBeforeDrag = '';
const kbdWrap = document.getElementById('keyboard-wrap');

kbdWrap.addEventListener('pointerdown', e => {
  if (!kbdOpen) return;
  textBeforeDrag = getText();  // 버튼 onClick보다 먼저: capture phase
  txStart = e.clientX;
  isDragging = false;
  kbdWrap.setPointerCapture(e.pointerId);
}, true);  // capture phase

kbdWrap.addEventListener('pointermove', e => {
  if (!kbdOpen || txStart === null) return;
  const dx = e.clientX - txStart;
  if (dx > 8) {
    if (!isDragging) {
      isDragging = true;
      if (typeof textBeforeDrag === 'string') {
        setText(textBeforeDrag);
      }
    }
    kbdDiv.style.transition = 'none';
    swipeHint.style.transition = 'none';
    kbdDiv.style.transform = `translateX(${dx}px)`;
    swipeHint.style.transform = `translateX(${dx}px)`;

    // dx 진행도에 따라 blur 실시간 감소
    const wrapW = kbdWrap.offsetWidth;
    const progress = Math.min(dx / wrapW, 1);          // 0~1
    const blur = 22 * (1 - progress);                  // 22px → 0px
    const brightness = 1 + 0.28 * progress;         // 0.72 → 1.0
    const saturate = 1.2 - 0.2 * progress;             // 1.2 → 1.0
    const scale = 1.06 - 0.06 * progress;              // 1.06 → 1.0
    adImg.style.transition = 'none';
    adImg.style.filter = `blur(${blur}px) brightness(${brightness}) saturate(${saturate})`;
    adImg.style.transform = `scale(${scale})`;
  }
});

kbdWrap.addEventListener('pointerup', e => {
  if (!kbdOpen || txStart === null) return;
  const dx = e.clientX - txStart;
  txStart = null;
  if (isDragging && dx > 80) {
    // 키 슬라이드 아웃
    kbdDiv.style.transition = 'transform 0.28s cubic-bezier(0.4,0,0.2,1)';
    swipeHint.style.transition = 'transform 0.28s cubic-bezier(0.4,0,0.2,1)';
    kbdDiv.style.transform = 'translateX(110%)';
    swipeHint.style.transform = 'translateX(110%)';
    // 블러도 같은 속도로 완전히 해제
    adImg.style.transition = 'filter 0.28s ease, transform 0.28s ease';
    adImg.style.filter = 'blur(0px) brightness(1) saturate(1)';
    adImg.style.transform = 'scale(1)';

    setTimeout(() => {
      kbdDiv.classList.remove('visible');
      swipeHint.classList.remove('show');
      requestAnimationFrame(() => {
        kbdDiv.style.transition = 'none';
        kbdDiv.style.transform = '';
        swipeHint.style.transition = 'none';
        swipeHint.style.transform = '';
        requestAnimationFrame(() => {
          // adImg 인라인 스타일 제거 — CSS class가 다시 제어
          adImg.style.transition = '';
          adImg.style.filter = '';
          adImg.style.transform = '';
          closeKeyboard();
        });
      });
    }, 290);
  } else {
    // 복귀: 키도 원위치, 블러도 원상복구
    kbdDiv.style.transition = 'transform 0.22s ease';
    swipeHint.style.transition = 'transform 0.22s ease';
    kbdDiv.style.transform = '';
    swipeHint.style.transform = '';
    adImg.style.transition = 'filter 0.22s ease, transform 0.22s ease';
    adImg.style.filter = 'blur(22px) brightness(1) saturate(1.2)';
    adImg.style.transform = 'scale(1.06)';
    setTimeout(() => {
      kbdDiv.style.transition = '';
      swipeHint.style.transition = '';
      adImg.style.transition = '';
    }, 250);
  }
  isDragging = false;
});

kbdWrap.addEventListener('pointercancel', () => {
  txStart = null; isDragging = false;
  kbdDiv.style.transition = 'transform 0.22s ease';
  kbdDiv.style.transform = '';
  swipeHint.style.transform = '';
  adImg.style.transition = 'filter 0.22s ease, transform 0.22s ease';
  adImg.style.filter = 'blur(22px) brightness(1) saturate(1.2)';
  adImg.style.transform = 'scale(1.06)';
});

setText('');
render();

// ── 페이지 로드 후 1초 뒤 자동으로 키보드 오픈 ──
setTimeout(() => {
  // 블러 트랜지션을 약간 느리게 설정해서 자연스럽게
  adImg.style.transition = 'filter 0.55s ease, transform 0.55s ease';
  openKeyboard();
  setTimeout(() => { adImg.style.transition = ''; }, 600);
}, 1000);
</script>
</body>
</html>
