<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hathabang PC Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;700;900&family=Noto+Sans:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  body { 
    background: url('images/windows.png') no-repeat center center fixed; 
    background-size: cover;
    font-family: 'Noto Sans Lao', 'Segoe UI', sans-serif;
    display: flex; flex-direction: column; align-items: center; 
    height: 100vh; margin: 0; overflow: hidden;
  }
  #notepad-container {
    width: 85%; max-width: 950px; margin-top: 60px;
    background: #fff; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    border-radius: 5px; overflow: hidden;
  }
  .title-bar {
    background: #4a86e8; color: white; padding: 8px 15px;
    font-size: 14px; display: flex; justify-content: space-between;
  }
  #editor { 
    height: 380px; padding: 25px; font-size: 38px; border: none; outline: none;
    white-space: pre-wrap; overflow-y: auto; box-sizing: border-box;
    position: relative; font-family: 'Noto Sans Lao', sans-serif;
  }
  #editor::after {
    content: "|";
    display: inline-block;
    color: #000;
    width: 2px;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
    font-weight: 100;
  }
  .caron { font-family: 'Noto Sans', Arial, sans-serif; font-size: 0.75em; color: #999; font-weight: 300; }
  @keyframes blink {
    from, to { color: transparent; }
    50% { color: black; }
  }

  .baby-guide-container {
    margin-top: 40px; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    background: none;       
    padding: 0;             
    backdrop-filter: none;  
    border: none;           
    position: relative;     
  }
  .keyboard-pc { 
    transform: scale(0.48); 
    transform-origin: center;
    display: flex; 
    flex-direction: column; 
    gap: 8px;
    width: 850px;
    margin-left: -200px; 
    margin-top: -70px;
    align-self: flex-start; 
  }
  .kb-row { display: flex; gap: 8px; width: 100%; }
  #row2 { padding-left: 35px; }
  #row3 { padding-left: 75px; }

  .key { 
    width: 65px; height: 65px; background: #fff; border-radius: 8px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    font-size: 24px; font-weight: 800; box-shadow: 0 4px 0 #888;
    color: #333; position: relative;
    font-family: 'Noto Sans Lao', sans-serif;
  }
  /* 중앙 간격을 위한 투명한 칸 */
  .spacer { width: 40px; height: 65px; }

  /* 2,3,4열 및 7,8,9열 파란색 */
  .key.blue-zone { 
    background-color: #e0f2fe !important; 
    border: 1px solid #bae6fd;
  }
  .key.multi { 
    font-size: 26px !important; font-weight: 900;
    white-space: nowrap;
  }
  .key.active { transform: translateY(4px); box-shadow: none; background: #eef2ff !important; }

  .key.next-key { color: #78350f; font-weight: 900; font-size: 26px; }
  .key.next-key.hconj-active { background-color: #d1fae5 !important; border: 1px solid #16a34a; color: #16a34a; }
  .key.repeat-key { color: #7e22ce; font-weight: 900; font-size: 24px; }
  .key.sign-color { color: #1a5228; font-weight: 700; font-size: 26px; }

  .key .main-char { font-size: 32px; font-weight: 900; line-height: 1; font-family: 'Noto Sans Lao', sans-serif; }
  .key .sub-chars { font-size: 18px; color: #555; line-height: 1; font-family: 'Noto Sans Lao', sans-serif; font-weight: 700; }

  .baby-label {
    color: white; 
    font-size: 18px; 
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
    position: absolute; 
    right: 45px;  
    top: 58%;       
    transform: translateY(-50%);
    white-space: nowrap;
  }
</style>
</head>
<body>

<button onclick="location.href='index.html'" 
        style="position: fixed; top: 20px; right: 78px; 
               padding: 10px 18px; font-size: 1.1em; 
               background-color: #3f6fb8; color: #fff; 
               border: none; border-radius: 8px; cursor: pointer; 
               box-shadow: 0 2px 6px rgba(0,0,0,0.15); z-index: 9999;">
  Home
</button>

<button onclick="resetEditor()"
        style="position: fixed; top: 20px; right: 300px;
               padding: 10px 18px; font-size: 1.1em;
               background-color: #6b7280; color: #fff;
               border: none; border-radius: 8px; cursor: pointer;
               box-shadow: 0 2px 6px rgba(0,0,0,0.15); z-index: 9999;
               font-family: 'Noto Sans Lao', sans-serif;">
  ↺ ລ້າງ
</button>

<div id="notepad-container">
  <div class="title-bar"><span>Note</span><span>✕</span></div>
  <div id="editor" contenteditable="false"></div>
</div>

<div class="baby-guide-container">
  <div class="keyboard-pc" id="kbd">
    <div class="kb-row" id="row1"></div>
    <div class="kb-row" id="row2"></div>
    <div class="kb-row" id="row3"></div>
  </div>
  <div class="baby-label">ຮາທາບັງ Guide Map 1.0</div>
</div>

<script>
// ── 자음 그룹 ──────────────────────────────────────────────
const consonantRows = {
  'ຮ': ['ຮ','ຣ'],
  'ທ': ['ທ','ຫ'],
  'ບ': ['ບ','ປ'],
  'ງ': ['ງ','ຈ'],
  'ພ': ['ພ','ຜ','ຝ','ຟ'],
  'ວ': ['ວ','ລ'],
  'ນ': ['ນ','ມ'],
  'ດ': ['ດ','ຕ'],
  'ຂ': ['ຂ','ຊ'],
  'ຄ': ['ຄ','ຍ','ຢ'],
  'ອ': ['ອ','ສ'],
  'ກ': ['ກ','ຖ'],
};

const hConjSet = new Set(['ນ','ມ','ງ','ຍ','ລ','ວ','ຣ']);
const hConjMap = { 'ນ': 'ໜ', 'ມ': 'ໝ', 'ລ': 'ຫຼ' };

// ── 레이아웃 정의 (10열 x 3행) ────────────────────────────
// col 0-based: 0=흰색, 1,2,3=파랑, 4=흰색, 5=흰색, 6,7,8=파랑, 9=흰색
// type: consonant | sign | next | dot | bs | repeat | empty

const rowDefs = [
  // Row1: q  w  e  r  t(빈)  [spacer]  y(빈)  u          i          o        p
  [
    { key:'q', type:'consonant', root:'ຮ' },
    { key:'w', type:'consonant', root:'ທ' },
    { key:'e', type:'consonant', root:'ບ' },
    { key:'r', type:'consonant', root:'ງ' },
    { key:'t', type:'empty' },
    { key:'_sp1', type:'spacer' },
    { key:'y', type:'empty' },
    { key:'u', type:'sign', chars:['ີ','ິ','ຶ'], id:'r0c0' },
    { key:'i', type:'sign', chars:['ັ','ົ','ື'], id:'r0c1' },
    { key:'o', type:'sign', chars:['່','໋'],     id:'r0c2' },
    { key:'p', type:'sign', chars:['້','໊'],     id:'r0c3' },
  ],
  // Row2: a  s  d  f  g(빈)  [spacer]  h(빈)  j          k(next)    l        ;
  [
    { key:'a', type:'consonant', root:'ພ' },
    { key:'s', type:'consonant', root:'ວ' },
    { key:'d', type:'consonant', root:'ນ' },
    { key:'f', type:'consonant', root:'ດ' },
    { key:'g', type:'empty' },
    { key:'_sp2', type:'spacer' },
    { key:'h', type:'empty' },
    { key:'j', type:'sign', chars:['ເ','ແ'],     id:'r1c0' },
    { key:'k', type:'next' },
    { key:'l', type:'sign', chars:['າ','ຳ'],     id:'r1c2' },
    { key:';', type:'sign', chars:['ະ','ໍ'],     id:'r1c3' },
  ],
  // Row3: z  x  c  v  b(빈)  [spacer]  n(repeat)  m          ,        .
  [
    { key:'z', type:'consonant', root:'ຂ' },
    { key:'x', type:'consonant', root:'ຄ' },
    { key:'c', type:'consonant', root:'ອ' },
    { key:'v', type:'consonant', root:'ກ' },
    { key:'b', type:'empty' },
    { key:'_sp3', type:'spacer' },
    { key:'n', type:'repeat' },
    { key:'m', type:'sign', chars:['ໃ','ໄ','ໂ'], id:'r2c0' },
    { key:',', type:'sign', chars:['ຸ','ູ'],      id:'r2c1' },
    { key:'.', type:'dot' },
  ],
];

// key → def 빠른 조회
const keyLookup = {};
rowDefs.forEach(row => row.forEach(def => { keyLookup[def.key] = def; }));

// 파란색 키: 좌측 2,3,4번째(w,e,r / s,d,f / x,c,v) + 우측 2,3,4번째(u,i,o / j,k,l / m,,,.)
const blueZoneKeys = new Set(['w','e','r','s','d','f','x','c','v','u','i','o','j','k','l','m',',','.']);

let state = {
  activeRoot: null, activeCharIdx: 0,
  lastSignKey: null, signTapIdx: 0,
  hConjMode: false, hConjChar: null,
  spaceMode: 0, // 0=초기, 1=1탭(ZWSP+캐런), 2+=공란모드
};

const editor = document.getElementById('editor');

function getText() { return editor.dataset.text || ''; }
function setText(t) {
  editor.dataset.text = t;
  const esc = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
               .replace(/\n/g,'<br>');
  const withCaron = esc.replace(/\u02C7/g, '<span class="caron">ˇ</span>');
  editor.innerHTML = withCaron;
}
const appendText = c => setText(getText() + c);
const replaceLastChar = c => { const t = getText(); if (!t.length) return; setText(t.slice(0,-1)+c); };
const doBackspace = () => { const t = getText(); if (!t.length) return; setText(t.slice(0,-1)); };

// 캐런 자동 삭제 + spaceMode 리셋
function clearCaron() {
  if (state.spaceMode === 1) {
    const t = getText();
    if (t.endsWith('\u02C7')) setText(t.slice(0, -1));
  }
  state.spaceMode = 0;
}

function getRoot(char) {
  for (const [root, arr] of Object.entries(consonantRows))
    if (arr.includes(char)) return root;
  return null;
}

function handleConsonant(root) {
  clearCaron();
  const arr = consonantRows[root];
  const char = arr[0];
  if (state.hConjMode) {
    const t = getText(); if (t.endsWith('+')) setText(t.slice(0,-1));
    doBackspace();
    if (hConjSet.has(char)) {
      appendText(hConjMap[char] || ('ຫ' + char));
      state.hConjChar = char;
    } else {
      appendText(char);
      state.hConjChar = null;
    }
    state.hConjMode = false;
    // 합자 완성 후엔 activeRoot 리셋 (변환키는 hConjChar 기준으로 표시)
    state.activeRoot = null; state.activeCharIdx = 0;
    state.lastSignKey = null; state.signTapIdx = 0;
    updateKbdUI(); return;
  }
  appendText(char);
  state.activeRoot = root; state.activeCharIdx = 0;
  state.lastSignKey = null; state.signTapIdx = 0;
  state.hConjMode = false; state.hConjChar = null;
  updateKbdUI();
}

function handleNext() {
  clearCaron();
  if (state.hConjChar) {
    const conjRoot = getRoot(state.hConjChar);
    if (conjRoot) {
      const arr = consonantRows[conjRoot];
      const nextChar = arr[(arr.indexOf(state.hConjChar) + 1) % arr.length];
      const currentConj = hConjMap[state.hConjChar] || ('ຫ' + state.hConjChar);
      setText(getText().slice(0, -currentConj.length));
      appendText(hConjMap[nextChar] || ('ຫ' + nextChar));
      state.hConjChar = nextChar;
      state.lastSignKey = null; state.signTapIdx = 0;
      updateKbdUI(); return;
    }
  }
  if (!state.activeRoot) return;
  const arr = consonantRows[state.activeRoot];
  if (state.activeRoot === 'ທ') {
    if (state.activeCharIdx === 0)      { replaceLastChar('ຫ'); state.activeCharIdx = 1; state.hConjMode = false; }
    else if (state.activeCharIdx === 1) { state.hConjMode = true; state.activeCharIdx = 2; appendText('+'); }
    else                                { const t2 = getText(); if (t2.endsWith('+')) setText(t2.slice(0,-1)); replaceLastChar('ທ'); state.hConjMode = false; state.activeCharIdx = 0; }
    state.lastSignKey = null; state.signTapIdx = 0;
    updateKbdUI(); return;
  }
  const nextIdx = (state.activeCharIdx + 1) % arr.length;
  replaceLastChar(arr[nextIdx]);
  state.activeCharIdx = nextIdx;
  state.lastSignKey = null; state.signTapIdx = 0;
  updateKbdUI();
}

function handleSign(keyId, chars) {
  clearCaron();
  if (state.lastSignKey === keyId) {
    state.signTapIdx = (state.signTapIdx + 1) % chars.length;
    setText(getText().slice(0,-1) + chars[state.signTapIdx]);
  } else {
    state.lastSignKey = keyId; state.signTapIdx = 0;
    appendText(chars[0]);
  }
  state.activeRoot = null; state.activeCharIdx = 0;
  updateKbdUI();
}

function handleDot() {
  clearCaron();
  appendText('.');
  state.lastSignKey = null; state.signTapIdx = 0;
  state.activeRoot = null; state.activeCharIdx = 0;
  updateKbdUI();
}

function handleBS() {
  if (state.spaceMode === 1) {
    const tc = getText();
    if (tc.endsWith('\u02C7')) setText(tc.slice(0, -1));
    state.spaceMode = 0;
    state.lastSignKey = null; state.signTapIdx = 0; state.hConjMode = false; state.hConjChar = null;
    const t2 = getText(); const last = t2.length ? t2[t2.length-1] : null; const root = last ? getRoot(last) : null;
    state.activeRoot = root; state.activeCharIdx = root ? consonantRows[root].indexOf(last) : 0;
    updateKbdUI(); return;
  }
  const t = getText();
  if (state.hConjMode && t.endsWith('+')) setText(t.slice(0,-1));
  doBackspace();
  state.lastSignKey = null; state.signTapIdx = 0;
  state.hConjMode = false; state.hConjChar = null;
  const t2 = getText();
  const last = t2.length ? t2[t2.length-1] : null;
  const root = last ? getRoot(last) : null;
  state.activeRoot = root;
  state.activeCharIdx = root ? consonantRows[root].indexOf(last) : 0;
  updateKbdUI();
}

function handleRepeat() {
  clearCaron();
  const chars = ['ໆ','ຯ'];
  if (state.lastSignKey === 'repeat') {
    state.signTapIdx = (state.signTapIdx + 1) % chars.length;
    setText(getText().slice(0,-1) + chars[state.signTapIdx]);
  } else {
    state.lastSignKey = 'repeat'; state.signTapIdx = 0;
    appendText(chars[0]);
  }
  state.activeRoot = null; state.activeCharIdx = 0;
  updateKbdUI();
}

function isDiacritic(c) {
  const cp = c.codePointAt(0);
  return (cp >= 0x0EB4 && cp <= 0x0EB9) || cp === 0x0EB1 || cp === 0x0EBB ||
         cp === 0x0EBC || (cp >= 0x0EC8 && cp <= 0x0ECD) || cp === 0x0EC6;
}

// ── 키보드 이벤트 ──────────────────────────────────────────
const ignoredKeys = new Set(['shift','control','alt','meta','capslock','tab','escape',
  'arrowleft','arrowright','arrowup','arrowdown',
  'f1','f2','f3','f4','f6','f7','f8','f9','f10','f11']);

window.addEventListener('keydown', (e) => {
  const raw = e.key;
  const k   = raw === ' ' ? ' ' : raw.toLowerCase();
  if (ignoredKeys.has(k)) return;
  if (k !== 'f5' && k !== 'f12') e.preventDefault();

  const el = document.getElementById(`key-${k}`);
  if (el) el.classList.add('active');

  if (k === 'backspace') { handleBS(); editor.scrollTop = editor.scrollHeight; return; }
  if (k === 'enter') { clearCaron(); if (state.hConjMode) { const t=getText(); if(t.endsWith('+')) setText(t.slice(0,-1)); } appendText('\n'); state.activeRoot=null; state.activeCharIdx=0; state.lastSignKey=null; state.hConjMode=false; updateKbdUI(); editor.scrollTop=editor.scrollHeight; return; }
  if (k === ' ') {
    if (state.hConjMode) { const t=getText(); if(t.endsWith('+')) setText(t.slice(0,-1)); state.hConjMode=false; }
    if (state.spaceMode === 0) {
      // 1탭: ZWSP + 캐런
      appendText('\u200B\u02C7');
      state.spaceMode = 1;
    } else {
      // 2탭 이후: 캐런 제거 후 공백
      const tc = getText();
      if (tc.endsWith('\u02C7')) setText(tc.slice(0, -1));
      appendText(' ');
      state.spaceMode = 2;
    }
    state.activeRoot=null; state.activeCharIdx=0; state.lastSignKey=null;
    updateKbdUI(); editor.scrollTop=editor.scrollHeight; return;
  }

  const def = keyLookup[k];
  if (!def || def.type === 'empty') return;

  if      (def.type === 'consonant') handleConsonant(def.root);
  else if (def.type === 'next')      handleNext();
  else if (def.type === 'sign')      handleSign(def.id, def.chars);
  else if (def.type === 'dot')       handleDot();
  else if (def.type === 'bs')        handleBS();
  else if (def.type === 'repeat')    handleRepeat();

  editor.scrollTop = editor.scrollHeight;
});

window.addEventListener('keyup', (e) => {
  const k = e.key === ' ' ? ' ' : e.key.toLowerCase();
  const el = document.getElementById(`key-${k}`);
  if (el) el.classList.remove('active');
});

// ── 키보드 UI 초기화 ───────────────────────────────────────
function initKbd() {
  rowDefs.forEach((row, ri) => {
    const rowEl = document.getElementById(`row${ri + 1}`);
    row.forEach((def, ci) => {
      const div = document.createElement('div');
      div.className = 'key';
      div.id = `key-${def.key}`;

      // 열 색상
      if (blueZoneKeys.has(def.key)) div.classList.add('blue-zone');

      if (def.type === 'consonant') {
        const arr = consonantRows[def.root];
        const main = document.createElement('span');
        main.className = 'main-char';
        main.textContent = arr[0];
        div.appendChild(main);
        if (arr.length > 1) {
          const sub = document.createElement('span');
          sub.className = 'sub-chars';
          sub.textContent = arr.slice(1).join('');
          div.appendChild(sub);
        }

      } else if (def.type === 'sign') {
        div.classList.add('multi', 'sign-color'); // blue-zone은 위에서 이미 처리
        div.textContent = def.chars.map(c => isDiacritic(c) ? '\u25CC'+c : c).join(' ');

      } else if (def.type === 'next') {
        div.classList.add('next-key');
        div.textContent = '⇄';

      } else if (def.type === 'dot') {
        div.classList.add('sign-color');
        div.textContent = '.';

      } else if (def.type === 'repeat') {
        div.classList.add('repeat-key');
        div.textContent = 'ໆຯ';

      } else if (def.type === 'spacer') {
        div.className = 'spacer';
        div.removeAttribute('id');
      }

      rowEl.appendChild(div);
    });
  });

  updateKbdUI();
}

function updateKbdUI() {
  const nextEl = document.getElementById('key-k');
  if (!nextEl) return;
  nextEl.classList.toggle('hconj-active', state.hConjMode);

  if (state.hConjChar) {
    // 합자 완성된 상태 → 그 합자 자음 그룹의 다음 차례 문자 표시 (변환키로 교체 가능)
    const conjRoot = getRoot(state.hConjChar);
    if (conjRoot) {
      const arr = consonantRows[conjRoot];
      const nextIdx = (arr.indexOf(state.hConjChar) + 1) % arr.length;
      nextEl.textContent = arr[nextIdx];
    } else {
      nextEl.textContent = '⇄';
    }
  } else if (state.hConjMode) {
    // 합자 대기 중, 아직 자음 안 들어온 상태
    nextEl.textContent = '+';
  } else if (state.activeRoot) {
    const arr = consonantRows[state.activeRoot];
    if (state.activeRoot === 'ທ') {
      if (state.activeCharIdx === 0)      nextEl.textContent = 'ຫ';
      else if (state.activeCharIdx === 1) nextEl.textContent = 'ຫ+';
      else                                nextEl.textContent = '+';
    } else {
      // 현재 activeCharIdx 기준 다음 차례 문자 표시
      const nextIdx = (state.activeCharIdx + 1) % arr.length;
      nextEl.textContent = arr[nextIdx];
    }
  } else {
    nextEl.textContent = '⇄';
  }
}

function resetEditor() {
  setText('');
  state = { activeRoot:null, activeCharIdx:0, lastSignKey:null, signTapIdx:0, hConjMode:false, hConjChar:null, spaceMode:0 };
  updateKbdUI();
}

initKbd();
</script>
</body>
</html>
